<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden – Hauser</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--teal:#1a4a5a;--teal-light:#2d8fa8;--cream:#f4f1ec;--dark:#141414;--text:#2c2c2c;--text-muted:#7a7a7a}
    body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);line-height:1.8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,12vw,80px);font-weight:700;color:var(--teal);margin-bottom:16px;line-height:1}
    p{margin-bottom:24px;color:var(--text-muted);max-width:360px}
    a{color:var(--teal);font-weight:600;text-decoration:none}
    a:hover{color:var(--teal-light)}
    .btn{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:14px 28px;background:var(--teal);color:white;border-radius:12px;font-size:15px;font-weight:600;transition:all 0.2s;box-shadow:0 6px 20px rgba(26,74,90,0.25)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(26,74,90,0.35);color:white}
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Diese Seite existiert nicht oder wurde verschoben.</p>
  <a href="index.html" class="btn">← Zur Startseite</a>
</body>
</html>
